version: 1
applications:
  - appRoot: apps/frontend
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build:frontend
      artifacts:
        baseDirectory: apps/frontend/dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
