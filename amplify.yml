version: 1
applications:
  - appRoot: apps/frontend
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci --prefer-offline --no-audit --no-fund --progress=false
        build:
          commands:
            - npx nx build frontend
      artifacts:
        baseDirectory: apps/frontend/dist
        files:
          - "**/*"
      cache:
        paths:
          - .nx/cache/**/*
          - ~/.npm/**/*
